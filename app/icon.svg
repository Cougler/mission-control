<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="sphere" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#1e3f7a"/>
      <stop offset="100%" stop-color="#05091a"/>
    </radialGradient>
    <clipPath id="bound">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>

  <!-- Sphere -->
  <circle cx="32" cy="32" r="31" fill="url(#sphere)"/>
  <circle cx="32" cy="32" r="31" fill="none" stroke="#1e3f7a" stroke-width="1"/>

  <!-- Stars -->
  <circle cx="10" cy="11" r="1.1" fill="white" opacity="0.9"/>
  <circle cx="51" cy="8"  r="0.9" fill="white" opacity="0.8"/>
  <circle cx="57" cy="28" r="1.0" fill="white" opacity="0.75"/>
  <circle cx="55" cy="50" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="7"  cy="46" r="1.0" fill="white" opacity="0.8"/>
  <circle cx="19" cy="57" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="46" cy="57" r="0.7" fill="white" opacity="0.6"/>

  <!-- Orbital arc (white ellipse, tilted) -->
  <ellipse cx="32" cy="32" rx="27" ry="11"
    fill="none" stroke="white" stroke-width="1.8" stroke-opacity="0.85"
    transform="rotate(-22, 32, 32)"
    clip-path="url(#bound)"/>

  <!-- Red swoosh (NASA chevron) -->
  <path d="M 3 43 Q 32 21 61 43"
    fill="none" stroke="#cc2200" stroke-width="4.5"
    stroke-linecap="round" clip-path="url(#bound)"/>

  <!-- MC text -->
  <text x="32" y="38"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="14"
    font-weight="900"
    fill="white"
    letter-spacing="-0.5">MC</text>
</svg>
